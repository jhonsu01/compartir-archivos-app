name: Release

# Genera APK (Android) y MSI (Windows) y los publica en la release de GitHub
# cada vez que se etiqueta una version vX.Y.Z.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------
  # APK Android
  # ---------------------------------------------------------------
  apk:
    name: Generar APK
    runs-on: ubuntu-latest
    outputs:
      filename: ${{ steps.find.outputs.filename }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-apk-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-apk-${{ runner.os }}-

      - name: Construir APK release (debug signing)
        run: ./gradlew :androidApp:assembleRelease --no-daemon --stacktrace

      - name: Renombrar APK con version
        id: find
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SRC=$(find androidApp/build/outputs/apk/release -name "*.apk" | head -1)
          DST="CompartirArchivos-${VERSION}.apk"
          cp "$SRC" "$DST"
          echo "filename=$DST" >> "$GITHUB_OUTPUT"

      - name: Subir APK a artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: ${{ steps.find.outputs.filename }}

      - name: Adjuntar APK a la release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find.outputs.filename }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ---------------------------------------------------------------
  # MSI Windows (runner Windows incluye WiX 3.x preinstalado)
  # ---------------------------------------------------------------
  msi:
    name: Generar MSI (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar sdk.dir
        shell: bash
        run: |
          ANDROID_HOME="$ANDROID_HOME"
          if [ -z "$ANDROID_HOME" ]; then ANDROID_HOME="$LOCALAPPDATA/Android/Sdk"; fi
          echo "sdk.dir=$ANDROID_HOME" | sed 's|\\|/|g' > local.properties
          cat local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-msi-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-msi-${{ runner.os }}-

      - name: Construir MSI
        shell: bash
        run: ./gradlew :desktopApp:packageReleaseMsi --no-daemon --stacktrace

      - name: Renombrar MSI con version
        id: find
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SRC=$(find desktopApp/build/compose/binaries -name "*.msi" | head -1)
          DST="CompartirArchivos-${VERSION}.msi"
          cp "$SRC" "$DST"
          echo "filename=$DST" >> "$GITHUB_OUTPUT"

      - name: Subir MSI a artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi
          path: ${{ steps.find.outputs.filename }}

      - name: Adjuntar MSI a la release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find.outputs.filename }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ---------------------------------------------------------------
  # Mantener SOLO la ultima release: borra releases y tags anteriores
  # ---------------------------------------------------------------
  cleanup:
    name: Mantener solo la ultima release
    runs-on: ubuntu-latest
    needs: [apk, msi]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      CURRENT: ${{ github.ref_name }}
    steps:
      - name: Borrar releases y tags antiguos
        run: |
          echo "Repo: $REPO | Manteniendo solo: $CURRENT"
          # Lista releases (por tag) y borra todas menos la actual.
          TAGS=$(gh release list --repo "$REPO" --limit 100 --json tagName --jq '.[].tagName' || true)
          if [ -z "$TAGS" ]; then echo "No hay releases que listar."; exit 0; fi
          for tag in $TAGS; do
            if [ "$tag" != "$CURRENT" ]; then
              echo "Borrando release + tag: $tag"
              gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag --yes || echo "  (no se pudo borrar $tag, sigo)"
            fi
          done
          echo "Releases restantes:"
          gh release list --repo "$REPO" || true
