name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Compilar (JDK 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Validar Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Compilar todos los modulos
        run: ./gradlew :shared:compileKotlinDesktop :shared:compileDebugKotlinAndroid :androidApp:compileDebugKotlinAndroid :desktopApp:compileKotlinDesktop --no-daemon --stacktrace

      - name: Subir errores (si los hay)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/
            **/build/compose/logs/
          if-no-files-found: ignore
